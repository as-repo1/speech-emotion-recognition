version: '3.8'

services:
  voxsense:
    build: .
    container_name: voxsense_app
    ports:
      - "5000:5000"
    volumes:
      - .:/app
      # Exclude local virtual environments and caches from docker mount to prevent pollution
      - /app/.venv
      - /app/__pycache__
    environment:
      - FLASK_ENV=development
      - PYTHONUNBUFFERED=1
    restart: always
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health', timeout=5)"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

